name: Feature request
description: Suggest an improvement or new capability.
title: "feat: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What research or workflow problem would this solve?
      placeholder: I need PureAutoCodeQL to...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior you want.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches or workarounds you tried.
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - CLI
        - API
        - CodeQL generation
        - Project import
        - Path selection
        - Configuration
        - Documentation
        - Other
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Sample inputs, target languages, or links to related docs.
