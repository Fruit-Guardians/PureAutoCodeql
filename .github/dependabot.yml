version: 2
updates:
  - package-ecosystem: uv
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 10
    groups:
      python-security:
        applies-to: security-updates
        patterns:
          - "*"
      python-minor:
        applies-to: version-updates
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: /tools/mcp_ripgrep
    schedule:
      interval: weekly
      day: monday
      time: "09:20"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 10
    groups:
      mcp-ripgrep-security:
        applies-to: security-updates
        patterns:
          - "*"
      mcp-ripgrep-minor:
        applies-to: version-updates
        update-types:
          - minor
          - patch
