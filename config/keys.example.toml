# PureAutoCodeQL LLM 配置文件
# 
# 使用说明：
# 1. 复制此文件为 keys.toml:  cp keys.example.toml keys.toml
# 2. 填入你的 API Keys
# 3. keys.toml 会被 .gitignore 忽略，不会提交到仓库
#
# 只需修改这个文件即可完成所有配置，无需修改代码！

# ============================================================================
# 内置服务商 API Keys
# ============================================================================
[builtin_keys]
# DeepSeek 官方 API
# 获取地址: https://platform.deepseek.com/api_keys
deepseek = "your_deepseek_api_key_here"

# 硅基流动 (推荐！提供多种免费模型)
# 获取地址: https://cloud.siliconflow.cn/account/ak
siliconflow = "your_siliconflow_api_key_here"

# 智谱 GLM
# 获取地址: https://open.bigmodel.cn/usercenter/apikeys
zhipu = "your_zhipu_api_key_here"

# Kimi (月之暗面)
# 获取地址: https://platform.moonshot.cn/console/api-keys
kimi = "your_kimi_api_key_here"

# Google Gemini
# 获取地址: https://makersuite.google.com/app/apikey
gemini = "your_gemini_api_key_here"

# Java JDK 路径（用于 Java LSP 服务器）
# Windows 示例：
# java_home = "C:\\Program Files\\Microsoft\\jdk-21.0.8.9-hotspot"
# Linux/macOS 示例：
# java_home = "/usr/lib/jvm/java-21-openjdk"
# 留空则从 JAVA_HOME 环境变量读取
java_home = ""


# ============================================================================
# 自定义服务商（可选）
# ============================================================================
# 取消注释并修改以下配置来添加自定义服务商
# 支持任何 OpenAI 兼容的 API（本地 Ollama、自定义代理、云服务等）
#
# 快速上手：
# 1. 取消注释下面的示例（删除开头的 #）
# 2. 修改 name, api_key, base_url, 模型名称
# 3. 运行：python Analyze.py --case CVE-XXX --provider your_name
#
# 验证配置：python -m config list

# 示例 1: OpenAI 官方或代理
# [[custom_providers]]
# name = "openai"
# display_name = "OpenAI 官方"
# api_key = "sk-xxxxxxxxxxxxxxxx"
# base_url = "https://api.openai.com/v1"
# think_model = "gpt-4"
# chat_model = "gpt-3.5-turbo"
# description = "OpenAI 官方 API"

# 示例 2: 本地 Ollama
# [[custom_providers]]
# name = "ollama"
# display_name = "本地 Ollama"
# api_key = "ollama"  # Ollama 不需要真实 key
# base_url = "http://localhost:11434/v1"
# think_model = "deepseek-r1:latest"
# chat_model = "qwen2.5:latest"
# description = "本地运行的 Ollama 模型"
# available_models = [
#     "deepseek-r1:latest",
#     "qwen2.5:latest",
#     "llama3:latest"
# ]

# 示例 3: 自定义代理服务
# [[custom_providers]]
# name = "my_proxy"
# display_name = "我的代理"
# api_key = "your_proxy_key"
# base_url = "https://your-proxy.com/v1"
# think_model = "custom-think-model"
# chat_model = "custom-chat-model"
# description = "自定义的 LLM 代理服务"


# ============================================================================
# 全局设置（可选）
# ============================================================================
[settings]
# 默认使用的服务商（不设置则使用 deepseek）
# 可选值: deepseek, siliconflow, zhipu, kimi, gemini, 或自定义服务商名称
# default_provider = "siliconflow"

# 覆盖默认推理模型（不设置则使用服务商默认）
# default_think_model = "deepseek-ai/DeepSeek-R1"

# 覆盖默认对话模型（不设置则使用服务商默认）
# default_chat_model = "Pro/deepseek-ai/DeepSeek-V3.2-Exp"

# CodeQL 标准库路径（可选）
# 如果不配置，系统会自动尝试以下方式查找：
# 1. 环境变量 CODEQL_STDLIB_PATH
# 2. 运行 `codeql resolve packs` 自动检测
# 3. 常见安装路径 (~/.codeql/packages/codeql, ~/codeql, /opt/codeql 等)
# 
# 示例配置：
# codeql_stdlib_path = "/home/username/Software/codeql/codeql"
# codeql_stdlib_path = "C:/Program Files/codeql"
# codeql_stdlib_path = "/opt/codeql"


# ============================================================================
# MCP Language Server 配置（用于 Agent 的代码分析能力）
# ============================================================================
# 配置各语言的 LSP 服务器,提供符号跳转、类型查询等高级代码导航功能
# 注意：占位符使用 {variable} 格式,运行时会自动替换

# Java 语言服务器配置
[mcp_language_server.java]
# LSP 可执行文件路径（支持相对路径和绝对路径）
# Windows 示例：
lsp_executable = "utils\\lsp\\jdt-language-server\\bin\\jdtls.bat"
# Linux/macOS 示例：
# lsp_executable = "utils/lsp/jdt-language-server/bin/jdtls"

# 参数模板（占位符: {workspace}, {lsp}, {java_executable}）
# "--" 之前是 MCP 参数, "--" 之后是传给 LSP 的参数
# 注意：路径可能包含空格，需要用引号包裹
args_template = "--workspace \"{workspace}\" --lsp \"{lsp}\" -- --java-executable \"{java_executable}\""

# Java 可执行文件路径（留空则从 builtin_keys.java_home 自动获取）
java_executable = ""

# Python 语言服务器配置
[mcp_language_server.python]
# LSP 可执行文件（可以是 PATH 中的命令名或完整路径）
lsp_executable = "pyright-langserver"

# 参数模板（占位符: {workspace}, {lsp}）
args_template = "--workspace {workspace} --lsp {lsp} -- --stdio"

# C/C++ 语言服务器配置
[mcp_language_server.cpp]
# LSP 可执行文件（可以是 PATH 中的命令名或完整路径）
lsp_executable = "clangd"

# 参数模板（占位符: {workspace}, {lsp}, {compile_commands_dir}）
# 基础配置（不指定 compile_commands_dir）：
args_template = "--workspace {workspace} --lsp {lsp}"
# 如需指定编译命令目录，可修改为：
# args_template = "--workspace {workspace} --lsp {lsp} -- --compile-commands-dir={compile_commands_dir}"

# 编译命令目录（可选，用于 C/C++ 项目）
compile_commands_dir = ""
