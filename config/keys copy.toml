# ============================================================================
# 全局设置（可选）
# ============================================================================
[settings]
default_provider = "deepseek"

# C/C++ 自动化建库配置 (使用 Docker 解决依赖问题)
# 在 Windows/Linux 上构建 C/C++ 项目时推荐开启
use_docker_for_cpp = false
docker_builder_image = "pure-codeql-cpp:latest"

# CodeQL 安装路径配置
# 如果不配置，系统会自动尝试查找常见位置
# codeql_stdlib_path = "/home/orxiain/Software/codeql/codeql"

# Java 语言服务器配置
[mcp_language_server.java]
# LSP 可执行文件路径（支持相对路径和绝对路径）
# Windows 示例：
lsp_executable = "C:\\Projects\\Pure\\utils\\lsp\\jdt-language-server\\bin\\jdtls.bat"
# Linux/macOS 示例：
# lsp_executable = "/home/orxiain/project/Temp/Pure/utils/lsp/jdt-language-server/bin/jdtls"

# 参数模板（占位符: {workspace}, {lsp}, {java_executable}）
# "--" 之前是 MCP 参数, "--" 之后是传给 LSP 的参数
# 注意：路径可能包含空格，需要用引号包裹
args_template = "--workspace \"{workspace}\" --lsp \"{lsp}\" -- --java-executable \"{java_executable}\""

# Java 可执行文件路径（留空则从 builtin_keys.java_home 自动获取）
java_executable = "C:\\Program Files\\BellSoft\\LibericaJDK-22\\bin\\java.exe"

# Python 语言服务器配置
[mcp_language_server.python]
# LSP 可执行文件（可以是 PATH 中的命令名或完整路径）
lsp_executable = "pyright-langserver"

# 参数模板（占位符: {workspace}, {lsp}）
args_template = "--workspace {workspace} --lsp {lsp} -- --stdio"

# C/C++ 语言服务器配置
[mcp_language_server.cpp]
# LSP 可执行文件（可以是 PATH 中的命令名或完整路径）
lsp_executable = "/home/orxiain/project/Temp/Pure/utils/lsp/ast-grep"

# 参数模板（占位符: {workspace}, {lsp}, {compile_commands_dir}）
# 基础配置（不指定 compile_commands_dir）：
args_template = "--workspace {workspace} --lsp {lsp} -- lsp"
# 如需指定编译命令目录，可修改为：
# args_template = "--workspace {workspace} --lsp {lsp} -- --compile-commands-dir={compile_commands_dir}"

# 编译命令目录（可选，用于 C/C++ 项目）
